<!DOCTYPE html>
<html>
<head>

<title>QuartzSMP | Staff Application</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #09090d;
    color: white;
    font-family: Arial, sans-serif;
}

.container {
    max-width: 600px;
    margin: 50px auto;
    background: #15151d;
    padding: 35px;
    border-radius: 16px;
    border: 1px solid #7c3aed;
    box-shadow: 0 0 25px rgba(124,58,237,0.2);
}

.logo {
    text-align: center;
    font-size: 36px;
    font-weight: bold;
    color: #a855f7;
}

.subtitle {
    text-align: center;
    color: #bdbdbd;
    margin-bottom: 30px;
    line-height: 1.5;
}

.notice {
    background: #1d1d27;
    border-left: 4px solid #a855f7;
    padding: 12px;
    border-radius: 8px;
    color: #d4d4d8;
    margin-bottom: 25px;
    font-size: 14px;
}

h2 {
    color: #c084fc;
}

label {
    display: block;
    margin-top: 18px;
    margin-bottom: 7px;
    font-weight: bold;
    color: #e9d5ff;
}

input, textarea {

    width: 100%;
    background: #0f0f14;
    border: 1px solid #333;
    color: white;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    outline: none;

}

input:focus, textarea:focus {
    border-color: #a855f7;
}

textarea {
    height: 110px;
    resize: vertical;
}

button {

    margin-top: 25px;
    width: 100%;
    padding: 14px;
    background: #9333ea;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;

}

button:hover {
    background:#7e22ce;
}


.footer {

    text-align:center;
    margin-top:25px;
    color:#777;
    font-size:13px;

}

</style>

</head>


<body>


<div class="container">


<div class="logo">
✦ QuartzSMP
</div>


<p class="subtitle">
Staff Application
<br>
Apply to become a part of the QuartzSMP staff team.
</p>


<div class="notice">

Please answer every question honestly. Low effort applications may be denied.

</div>



<form id="applicationForm">


<h2>Application Form</h2>



<label>What is your Discord Username?</label>
<input id="discord" placeholder="Enter your Discord username" required>



<label>What is your IGN?</label>
<input id="ign" placeholder="Enter your Minecraft username" required>



<label>How old are you?</label>
<input id="age" placeholder="Enter your age" required>



<label>What timezone are you in?</label>
<input id="timezone" placeholder="Example: GMT+1">



<label>Why do you want to become staff on QuartzSMP?</label>
<textarea id="reason" placeholder="Explain your motivation"></textarea>



<label>Do you have any previous staff experience?</label>
<textarea id="experience" placeholder="Tell us about your experience"></textarea>



<label>Why should we choose you over other applicants?</label>
<textarea id="choose" placeholder="Explain why you stand out"></textarea>



<label>What benefits can you bring to the staff team?</label>
<textarea id="benefits" placeholder="Your skills and qualities"></textarea>



<label>What are your strengths and weaknesses?</label>
<textarea id="strengths" placeholder="Tell us about yourself"></textarea>



<label>How active can you be on QuartzSMP?</label>
<textarea id="activity" placeholder="Hours per day/week"></textarea>



<label>Have you ever been punished on a Minecraft server?</label>
<textarea id="punishments" placeholder="Explain if yes"></textarea>



<label>What would you do if two players were arguing?</label>
<textarea id="argument" placeholder="Explain how you would handle it"></textarea>



<label>What would you do if a staff member abused their permissions?</label>
<textarea id="abuse" placeholder="Explain your actions"></textarea>



<label>Do you understand that staff permissions should never be abused?</label>
<textarea id="rules" placeholder="Your answer"></textarea>



<label>Do you have any ideas to improve QuartzSMP?</label>
<textarea id="ideas" placeholder="Share your ideas"></textarea>



<button type="submit">

Submit Application

</button>



</form>



<div class="footer">

QuartzSMP © 2026 • Staff Applications

</div>


</div>



<script>


const webhookURL = https://discord.com/api/webhooks/1529541372556607529/MKeyC6GRBOnIfGW6ZHYiymxGrjITHmmc_ZgZClNmeOoT9p0jzMAbMVzYQt5TqW2m1-1K



document.getElementById("applicationForm").addEventListener("submit", function(e){


e.preventDefault();



const embed = {


embeds:[

{

title:"✦ New QuartzSMP Staff Application",

color:10181046,


fields:[


{name:"Discord Username", value:discord.value},

{name:"Minecraft IGN", value:ign.value},

{name:"Age", value:age.value},

{name:"Timezone", value:timezone.value},

{name:"Why Staff?", value:reason.value},

{name:"Experience", value:experience.value},

{name:"Why Choose You?", value:choose.value},

{name:"Benefits", value:benefits.value},

{name:"Strengths & Weaknesses", value:strengths.value},

{name:"Activity", value:activity.value},

{name:"Punishments", value:punishments.value},

{name:"Player Argument", value:argument.value},

{name:"Staff Abuse", value:abuse.value},

{name:"Staff Permission Understanding", value:rules.value},

{name:"Ideas", value:ideas.value}


],


footer:{

text:"QuartzSMP Staff Applications"

}


}

]


};



fetch(webhookURL,{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(embed)


});


alert("Your application has been submitted!");



});


</script>


</body>
</html>
