<!DOCTYPE html>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #09090d;
    color: white;
    font-family: Arial, sans-serif;
}

.container {
    max-width: 600px;
    margin: 50px auto;
    background: #15151d;
    padding: 35px;
    border-radius: 16px;
    border: 1px solid #7c3aed;
    box-shadow: 0 0 25px rgba(124,58,237,0.2);
}

.logo {
    text-align: center;
    font-size: 36px;
    font-weight: bold;
    color: #a855f7;
}

.subtitle {
    text-align: center;
    color: #bdbdbd;
    margin-bottom: 30px;
    line-height: 1.5;
}

.notice {
    background: #1d1d27;
    border-left: 4px solid #a855f7;
    padding: 12px;
    border-radius: 8px;
    color: #d4d4d8;
    margin-bottom: 25px;
    font-size: 14px;
}

h2 {
    color: #c084fc;
}

label {
    display: block;
    margin-top: 18px;
    margin-bottom: 7px;
    font-weight: bold;
    color: #e9d5ff;
}

input, textarea {
    width: 100%;
    background: #0f0f14;
    border: 1px solid #333;
    color: white;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
}

input:focus, textarea:focus {
    border-color: #a855f7;
}

textarea {
    height: 110px;
    resize: vertical;
}

button {
    margin-top: 25px;
    width: 100%;
    padding: 14px;
    background: #9333ea;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #7e22ce;
}

.footer {
    text-align: center;
    margin-top: 25px;
    color: #777;
    font-size: 13px;
}
</style>

</head>
