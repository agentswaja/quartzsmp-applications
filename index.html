<!DOCTYPE html>
<html>
<head>
<title>QuartzSMP | Staff Application</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #0b0b0f;
    color: white;
    font-family: Arial, sans-serif;
}

.container {
    max-width: 600px;
    margin: 50px auto;
    background: #15151d;
    padding: 35px;
    border-radius: 16px;
    border: 1px solid #6d28d9;
}

.logo {
    text-align: center;
    font-size: 32px;
    font-weight: bold;
    color: #a855f7;
}

.subtitle {
    text-align: center;
    color: #bdbdbd;
    margin-bottom: 30px;
}

h2 {
    color: #c084fc;
}

label {
    display: block;
    margin-top: 18px;
    margin-bottom: 6px;
    font-weight: bold;
}

input, textarea {
    width: 100%;
    background: #0f0f14;
    border: 1px solid #333;
    color: white;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
}

textarea {
    height: 100px;
    resize: vertical;
}

button {
    margin-top: 25px;
    width: 100%;
    padding: 14px;
    background: #9333ea;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #7e22ce;
}

.footer {
    text-align: center;
    margin-top: 25px;
    color: #777;
    font-size: 13px;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">
✦ QuartzSMP
</div>

<p class="subtitle">
Staff Application
<br>
Apply to become a part of the QuartzSMP staff team.
</p>


<h2>Application Form</h2>


<label>Discord Username</label>
<input placeholder="Enter your Discord username">


<label>Age</label>
<input placeholder="Enter your age">


<label>Why do you want to become staff?</label>
<textarea placeholder="Explain your motivation"></textarea>


<label>Why should we accept you over others?</label>
<textarea placeholder="Explain why you stand out"></textarea>


<label>What benefits can you bring to the team?</label>
<textarea placeholder="Your skills and qualities"></textarea>


<label>What are your strengths and weak spots?</label>
<textarea placeholder="Tell us about yourself"></textarea>


<label>How long can you moderate on this server?</label>
<textarea placeholder="Your available time"></textarea>


<label>What would you do if two players are arguing?</label>
<textarea placeholder="Explain how you would handle it"></textarea>


<button>
Submit Application
</button>


<div class="footer">
QuartzSMP © 2026 • Staff Applications
</div>

</div>

</body>
</html>
